name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run tests
        run: python -m unittest discover tests -v

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
          - os: macos-latest
            name: macos-arm64
          - os: windows-latest
            name: windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      # ── Build C++ engine ──
      - name: Build engine (macOS/Linux)
        if: runner.os != 'Windows'
        working-directory: engine
        run: make CPU=1

      - name: Install CUDA Toolkit (Windows)
        if: runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@v0.2.22
        with:
          cuda: '12.6.3'
          method: network
          sub-packages: '["nvcc", "cudart", "nvrtc", "nvrtc_dev", "cudart_dev", "cuda_runtime"]'

      - name: List CUDA libs (debug)
        if: runner.os == 'Windows'
        shell: cmd
        run: dir /s "%CUDA_PATH%\lib\x64\*.lib" 2>nul | findstr /i "cuda nvrtc"

      - name: Build engine (Windows GPU+CPU)
        if: runner.os == 'Windows'
        working-directory: engine
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cl /O2 /DNDEBUG /EHsc /std:c++17 /I"%CUDA_PATH%\include" /c kalien.cpp /Fokalien.obj
          nvcc -O3 -DNDEBUG -std=c++17 -c kernel.cu -o kernel.obj
          cl kalien.obj kernel.obj /link /LIBPATH:"%CUDA_PATH%\lib\x64" cudart.lib nvrtc.lib /OUT:kalien.exe

      # ── Bundle into single executable ──
      - name: Build with PyInstaller
        run: pyinstaller kalien-farmer.spec

      - name: Smoke test
        shell: bash
        run: |
          if [ -f dist/kalien-farmer ]; then ./dist/kalien-farmer --help; fi
          if [ -f dist/kalien-farmer.exe ]; then ./dist/kalien-farmer.exe --help; fi

      # ── Platform-specific packages ──

      # Windows: .zip
      - name: Package .zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/kalien-farmer.exe -DestinationPath dist/kalien-farmer-${{ matrix.name }}.zip

      # macOS: .dmg
      - name: Package .dmg (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/dmg
          cp dist/kalien-farmer dist/dmg/
          hdiutil create -volname "Kalien Farmer" \
            -srcfolder dist/dmg \
            -ov -format UDZO \
            dist/kalien-farmer-${{ matrix.name }}.dmg

      # Linux: .tar.gz + .deb
      - name: Package .tar.gz (Linux)
        if: runner.os == 'Linux'
        run: cd dist && tar czf kalien-farmer-${{ matrix.name }}.tar.gz kalien-farmer

      - name: Package .deb (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION=$(echo "${GITHUB_REF_NAME:-v0.1.0}" | sed 's/^v//')
          mkdir -p pkg/usr/local/bin pkg/DEBIAN
          cp dist/kalien-farmer pkg/usr/local/bin/
          chmod +x pkg/usr/local/bin/kalien-farmer
          printf 'Package: kalien-farmer\nVersion: %s\nArchitecture: amd64\nMaintainer: Kalien Farmer\nDescription: Automated beam search pipeline for kalien.xyz\n' "$VERSION" > pkg/DEBIAN/control
          dpkg-deb --build pkg dist/kalien-farmer-${{ matrix.name }}.deb

      # ── Upload all artifacts ──
      - name: Upload
        uses: actions/upload-artifact@v5
        with:
          name: kalien-farmer-${{ matrix.name }}
          path: |
            dist/kalien-farmer-*.zip
            dist/kalien-farmer-*.dmg
            dist/kalien-farmer-*.tar.gz
            dist/kalien-farmer-*.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Delete existing release (if any)
        run: gh release delete "${{ github.ref_name }}" --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
